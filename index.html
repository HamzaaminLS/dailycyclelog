<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Little Star Sales v2</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #0f1117; overscroll-behavior-y: contain; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const STORAGE_KEY = "littlestar-sales-cloud";
    
    // 🔴 YOUR NEW GOOGLE SCRIPT URL 🔴
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyu97rQVVNq_aMcuphsTCJiOW-_SZ3kzRsxdNScMVLlXj8Gu6YVpJGHX7wl9ch0_ThZDg/exec";
    
    // Fixed unbreakable SVG Star Logo
    const LOGO_BASE64 = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2Y1OWUwYiI+PHBhdGggZD0iTTEyIDJMMTUuMDkgOC4yNkwyMiA5LjI3TDE3IDE0LjE0TDE4LjE4IDIxLjAyTDEyIDE3Ljc3TDUuODIgMjEuMDJMNyAxNC4xNEwyIDkuMjdMOC45MSA4LjI2TDEyIDJaIi8+PC9zdmc+';

    const DEFAULT_CARS = [
      {n:"Sprinter",p:2750},{n:"Stroller",p:2400},{n:"Twilight",p:2000},{n:"Super Tolo",p:1750},{n:"Swift Rider",p:1350},{n:"Sparkle",p:1550},
      {n:"Panda",p:1800},{n:"Mercedese",p:1700},{n:"Mic Cruiser",p:2850},{n:"Sunflower",p:1800},{n:"Rainbow",p:1900},{n:"3D",p:1150},
      {n:"Classic",p:1500},{n:"Crystal",p:1700},{n:"Duckling",p:2000},{n:"Jaguar",p:1400},{n:"Jungle",p:1300},{n:"Mick. Mouse",p:2050},
      {n:"Mick. Rider",p:2200},{n:"Minion",p:2150},{n:"Skyjet",p:1550}
    ];

    const WHOLESALERS = [
      {n:"Khwaja",c:"Karachi"},{n:"Naqi",c:"Karachi"},{n:"Saleem",c:"Karachi"},{n:"Mairaj",c:"Karachi"},{n:"Moosa",c:"Karachi"},{n:"Umair",c:"Karachi"},
      {n:"Evergreen",c:"Karachi"},{n:"Noor Alam",c:"Karachi"},{n:"Irfan",c:"Karachi"},{n:"Aslam",c:"Karachi"},{n:"Ashraf",c:"Karachi"},
      {n:"Rajesh",c:"Karachi"},{n:"Khaleel Cycle",c:"Karachi"},{n:"Shamshad",c:"Karachi"},{n:"Hamza Col",c:"Karachi"},{n:"PVT",c:"Karachi"},
      {n:"Tanzeel",c:"Karachi"},{n:"Super Cycle",c:"Karachi"},{n:"Memon Cycle",c:"Karachi"},{n:"Mudassir",c:"Karachi"},{n:"Usman Aziz",c:"Karachi"},
      {n:"Shandar Cycle",c:"Karachi"},{n:"Alkaswa",c:"Karachi"},
      {n:"Faisal Digri",c:"Sindh"},{n:"Raja Bright",c:"Sindh"},{n:"Fancy Cycle",c:"Sindh"},{n:"Ghousia Digri",c:"Sindh"},
      {n:"A1 Lahore",c:"Punjab"},{n:"Farhan Yousuf",c:"Punjab"},{n:"Fahad Lahore",c:"Punjab"},{n:"Talat Sialkot",c:"Punjab"},{n:"Pak Punjab",c:"Punjab"},
      {n:"Aslam Cycle",c:"Punjab"},{n:"Imran Cycle",c:"Punjab"},{n:"Abdul Hafeez",c:"Punjab"},{n:"Khurram Pindi",c:"Punjab"},{n:"Aslam Cycle 2",c:"Punjab"},
      {n:"Sheikhpura",c:"Punjab"},{n:"Fine Cycle",c:"Punjab"},{n:"Dilawar But",c:"Punjab"},{n:"Khurram Pindi 2",c:"Punjab"},
      {n:"Quetta Khalid",c:"Balochistan"},{n:"Mudassir 2",c:"Balochistan"},
      {n:"Umer Cycle",c:"KPK"},{n:"Ayaz Banaras",c:"KPK"},{n:"Irfan Mangora",c:"KPK"},{n:"Mardan",c:"KPK"}
    ];

    const fmt = n => (n||0).toLocaleString('en-PK');
    const todayStr = () => new Date().toISOString().split('T')[0];
    function fmtD(d){ try{ const dt=new Date(d+'T00:00:00'); return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear(); }catch(e){return d} }

    function printSlipHTML(sale) {
      const w = window.open('', '_blank', 'width=1100,height=800');
      const invoiceCopyHTML = (label) => {
        const wp = sale.withPrice;
        let thExtra = '', grandTotalExtra = '';
        const grandTotal = sale.items.reduce((s,x) => s + (x.qty * x.price), 0);
        if (wp) {
          thExtra = '<th class="r">Rate</th><th class="r">Total</th>';
          grandTotalExtra = `<td class="r"></td><td class="r" style="font-size:11pt;font-weight:800">PKR ${fmt(grandTotal)}</td>`;
        }
        const rows = sale.items.map((it, i) => {
          let extra = ''; 
          if(wp){ extra = `<td class="r">${fmt(it.price)}</td><td class="r" style="font-weight:700">${fmt(it.qty * it.price)}</td>`; }
          return `<tr><td class="c" style="color:#888;font-weight:700">${i+1}</td><td style="font-weight:700">${it.name}</td><td class="r" style="font-weight:800">${it.qty}</td>${extra}</tr>`;
        }).join('');
        
        return `
          <div class="invoice-copy">
            <div class="copy-badge">${label}</div>
            <div class="inv-hdr">
              <img src="${LOGO_BASE64}" class="inv-logo" alt="Logo">
              <div class="inv-hdr-text">
                <h1>Little Star</h1>
                <div class="tagline">Quality Kids Vehicles&ensp;•&ensp;Karachi, Pakistan</div>
              </div>
            </div>
            <div class="inv-sep"></div>
            <div class="inv-meta">
              <div class="inv-mi"><b>Date:</b><span>${fmtD(sale.date)}</span></div>
              <div class="inv-mi"><b>Bill No:</b><span style="font-weight:800;letter-spacing:.5px;font-size:12pt">${sale.slipNo||'\u2014'}</span></div>
              <div class="inv-mi"><b>Buyer:</b><span style="font-weight:800;font-size:12pt">${sale.wholesaler}</span></div>
              <div class="inv-mi"><b>City:</b><span>${sale.city}</span></div>
            </div>
            <div class="inv-table-wrap">
              <table class="inv-table">
                <thead><tr><th class="c" style="width:7%">#</th><th>Model</th><th class="r">Qty</th>${thExtra}</tr></thead>
                <tbody>${rows}
                  <tr class="trow"><td></td><td style="font-weight:800">TOTAL</td><td class="r" style="font-weight:800">${sale.totalUnits} units</td>${grandTotalExtra}</tr>
                </tbody>
              </table>
            </div>
          </div>
        `;
      };

      w.document.write(`
        <!DOCTYPE html>
        <html><head>
        <title>Invoice ${sale.slipNo}</title>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
        <style>
          @page{size:A4 landscape;margin:0}
          *{margin:0;padding:0;box-sizing:border-box;font-family:"DM Sans","Segoe UI",sans-serif}
          body{width:297mm;margin:0 auto}
          .invoice-copies{display:flex;width:100%;min-height:210mm}
          .invoice-copy{width:50%;padding:8mm 12mm 8mm;position:relative;overflow:hidden;border-right:2px dashed #bbb;display:flex;flex-direction:column}
          .invoice-copy:last-child{border-right:none;border-left:2px dashed #bbb}
          .copy-badge{position:absolute;top:5mm;right:8mm;font-size:7.5pt;font-weight:800;color:#1a1a2e;background:#e8e8f0;padding:2px 10px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
          .inv-hdr{text-align:center;margin-bottom:3mm;display:flex;align-items:center;justify-content:center;gap:4mm}
          .inv-logo{width:14mm;height:auto}
          .inv-hdr-text h1{font-size:20pt;font-weight:800;color:#1a1a2e;letter-spacing:3px;text-transform:uppercase}
          .inv-hdr-text .tagline{font-size:8pt;color:#888;margin:1mm 0 0;letter-spacing:1px;text-transform:uppercase;font-weight:600}
          .inv-sep{height:2px;background:linear-gradient(90deg,transparent,#1a1a2e,transparent);margin:2.5mm 0}
          .inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:2mm 8mm;margin-bottom:4mm;padding:3mm 4mm;background:#f4f4fa;border-radius:2mm;border:1px solid #e0e0e8}
          .inv-mi{display:flex;gap:2mm;font-size:10pt;font-weight:600}
          .inv-mi b{color:#1a1a2e;min-width:20mm;font-weight:800}
          .inv-mi span{color:#333;font-weight:700}
          .inv-table-wrap{flex:1;display:flex;flex-direction:column}
          .inv-table{width:100%;border-collapse:collapse;font-size:9pt;font-weight:600}
          .inv-table th{background:#1a1a2e;color:#fff;padding:2mm 3mm;text-align:left;font-size:8pt;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
          .inv-table td{padding:1.8mm 3mm;border-bottom:.5px solid #ddd;font-weight:600}
          .inv-table tr:nth-child(even) td{background:#f8f8fc}
          .inv-table .trow td{border-top:2.5px solid #1a1a2e;font-weight:800;font-size:10pt;background:#e8e8f8!important;color:#1a1a2e;border-bottom:none}
          .r{text-align:right!important}.c{text-align:center!important}
          @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
        </style>
        </head><body><div class="invoice-copies">${invoiceCopyHTML('BUYER COPY')}${invoiceCopyHTML("OFFICE COPY")}</div></body></html>
      `);
      w.document.close();
      w.focus();
      setTimeout(() => { w.print(); w.close(); }, 500);
    }

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passwordInput, setPasswordInput] = useState("");
      
      const [dark, setDark] = useState(true);
      const [tab, setTab] = useState("entry");
      const [toast, setToast] = useState(null);
      
      const [salesLog, setSalesLog] = useState([]);
      const [prices, setPrices] = useState({});
      
      const [isSyncing, setIsSyncing] = useState(false);
      
      const [saleDate, setSaleDate] = useState(todayStr());
      const [buyerIdx, setBuyerIdx] = useState("");
      const [withPrice, setWithPrice] = useState(false);
      const [carQtys, setCarQtys] = useState({});

      // Filters for Log
      const [logFilterWho, setLogFilterWho] = useState("");
      const [logFilterMonth, setLogFilterMonth] = useState("");

      useEffect(() => {
        if (localStorage.getItem("littlestar-auth") === "hamza") setIsAuthenticated(true);
      }, []);

      const showToast = useCallback((msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 2500);
      }, []);

      // Auto-Sync Function
      const triggerCloudSync = async (log, pr) => {
        setIsSyncing(true);
        const payload = { salesLog: log, prices: pr, updatedAt: Date.now() };
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
        } catch (e) {
          console.error("Auto sync failed", e);
        }
        setIsSyncing(false);
      };

      const saveToLocal = (log, pr) => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ salesLog: log, prices: pr }));
        setSalesLog(log);
        setPrices(pr);
        triggerCloudSync(log, pr); // Instantly auto-save to Google Sheets
      };

      const pullFromCloud = useCallback(async () => {
        setIsSyncing(true);
        try {
          const res = await fetch(SCRIPT_URL);
          const text = await res.text();
          const d = text ? JSON.parse(text) : {};
          if (d.salesLog) {
            setSalesLog(d.salesLog); 
            if (d.prices) setPrices(d.prices);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
          }
        } catch (e) { }
        setIsSyncing(false);
      }, []);

      useEffect(() => {
        if (!isAuthenticated) return;
        const localVal = localStorage.getItem(STORAGE_KEY);
        if (localVal) {
          try {
            const d = JSON.parse(localVal);
            if (d.salesLog) setSalesLog(d.salesLog);
            if (d.prices) setPrices(d.prices);
          } catch(e){}
        } else {
          const defaultP = {};
          DEFAULT_CARS.forEach(c => defaultP[c.n] = c.p);
          setPrices(defaultP);
        }
        pullFromCloud();
      }, [isAuthenticated, pullFromCloud]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (passwordInput === "hamza") {
          setIsAuthenticated(true);
          localStorage.setItem("littlestar-auth", "hamza");
        } else showToast("Incorrect Password", "error");
      };

      // --- LOGIC: NEW SALE ---
      const activeBuyer = buyerIdx !== "" ? WHOLESALERS[buyerIdx] : null;
      
      const getNextSlip = (buyerName) => {
        if(!buyerName) return "";
        // Filter by specific wholesaler
        const s = salesLog.filter(x => x.wholesaler === buyerName && x.slipNo);
        let mx = 0; 
        s.forEach(x => { const n = parseInt(x.slipNo)||0; if(n>mx) mx=n; });
        return String(mx+1).padStart(3,'0');
      };

      const handleGenerateInvoice = () => {
        if (!activeBuyer) return showToast("Select a buyer!", "error");
        const items = [];
        DEFAULT_CARS.forEach(c => {
          const q = parseInt(carQtys[c.n]) || 0;
          if (q > 0) items.push({ name: c.n, qty: q, price: prices[c.n] || c.p });
        });

        if (!items.length) return showToast("Enter at least one quantity", "error");

        const sale = {
          id: Date.now(),
          date: saleDate,
          slipNo: getNextSlip(activeBuyer.n),
          wholesaler: activeBuyer.n,
          city: activeBuyer.c,
          items,
          totalUnits: items.reduce((s, x) => s + x.qty, 0),
          withPrice
        };

        const newLog = [sale, ...salesLog];
        saveToLocal(newLog, prices);
        
        setBuyerIdx(""); setCarQtys({}); setWithPrice(false);
        showToast("Sale Auto-Saved & Printing...");
        printSlipHTML(sale);
      };

      // --- LOGIC: IMPORT/EXPORT JSON ---
      const doExportJSON = () => {
        const payload = { salesLog, prices, exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url;
        a.download = `littlestar_backup_${todayStr()}.json`;
        a.click();
      };

      const handleImportJSON = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const d = JSON.parse(event.target.result);
            if(d.salesLog && d.prices) {
              saveToLocal(d.salesLog, d.prices);
              showToast("Data Imported Successfully!");
            } else showToast("Invalid file format", "error");
          } catch(err) { showToast("Error reading file", "error"); }
        };
        reader.readAsText(file);
        e.target.value = null; // reset input
      };


      // Styles
      const bg = dark ? "#0f1117" : "#f5f5f0";
      const card = dark ? "#1a1d27" : "#ffffff";
      const cb = dark ? "#2a2d3a" : "#e2e2dd";
      const tx = dark ? "#e8e8e8" : "#1a1a1a";
      const txd = dark ? "#8b8fa3" : "#777777";
      const acc = "#4f8cff"; const okC = "#22c55e"; const dnC = "#ef4444";

      const S = {
        app: { fontFamily:"'Nunito','Segoe UI',sans-serif", background:bg, color:tx, minHeight:"100vh", maxWidth:600, margin:"0 auto", paddingBottom:80, fontSize:15 },
        header: { background:dark?"#161822":"#fff", borderBottom:`1px solid ${cb}`, position:"sticky", top:0, zIndex:100 },
        crd: { background:card, border:`1px solid ${cb}`, borderRadius:12, margin:"8px 12px", padding:"12px 14px" },
        btn:(b,c="#fff")=>({ background:b, color:c, border:"none", borderRadius:8, padding:"10px 16px", fontWeight:700, fontSize:14, cursor:"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center", width: "100%" }),
        inp: { background:dark?"#252836":"#f0f0ec", border:`1px solid ${cb}`, borderRadius:8, padding:"9px 12px", color:tx, fontSize:15, width:"100%", boxSizing:"border-box", outline:"none" },
        sel: { background:dark?"#252836":"#f0f0ec", border:`1px solid ${cb}`, borderRadius:8, padding:"9px 12px", color:tx, fontSize:15, width:"100%", boxSizing:"border-box" },
        nav: { position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:600, background:dark?"#161822":"#fff", borderTop:`1px solid ${cb}`, display:"flex", zIndex:100 },
        nI:(a)=>({ flex:1, padding:"10px 0 12px", textAlign:"center", background:"none", border:"none", color:a?acc:txd, fontSize:11, fontWeight:a?800:600, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }),
        toast: { position:"fixed", top:80, left:"50%", transform:"translateX(-50%)", background:toast?.type==="error"?dnC:okC, color:"#fff", padding:"10px 24px", borderRadius:10, fontWeight:700, fontSize:14, zIndex:9999, boxShadow:"0 4px 20px rgba(0,0,0,0.3)" },
        lbl: { fontSize:12, fontWeight:700, color:txd, marginBottom:4, display:"block" },
      };

      if (!isAuthenticated) {
        return (
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", backgroundColor: "#0f1117", color: "#e8e8e8", fontFamily: "'Nunito', sans-serif" }}>
            <form onSubmit={handleLogin} style={{ backgroundColor: "#1a1d27", padding: "40px 30px", borderRadius: "16px", textAlign: "center", width: "320px", border: "1px solid #2a2d3a" }}>
              <div style={{ fontSize: "40px", marginBottom: "10px" }}>⭐</div>
              <h2 style={{ margin: "0 0 20px 0", fontSize: "22px", fontWeight: "800" }}>Little Star Sales v2</h2>
              <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} style={{ width: "100%", padding: "12px", marginBottom: "20px", borderRadius: "8px", border: "1px solid #2a2d3a", backgroundColor: "#252836", color: "#fff", outline: "none" }} placeholder="Enter password" autoFocus />
              <button type="submit" style={{ width: "100%", padding: "14px", borderRadius: "8px", border: "none", backgroundColor: "#4f8cff", color: "#fff", fontWeight: "800", cursor: "pointer" }}>Unlock App</button>
            </form>
          </div>
        );
      }

      return (
        <div style={S.app}>
          <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
          {toast && <div style={S.toast}>{toast.msg}</div>}

          <div style={S.header}>
            <div style={{ background: isSyncing ? acc+"22" : okC+"22", padding: "4px", textAlign: "center", fontSize: 11, fontWeight: 800, color: isSyncing ? acc : okC }}>
              {isSyncing ? "🔄 Auto-Syncing to Google Sheets..." : "☁️ Cloud Synced"}
            </div>
            
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px" }}>
              <div style={{ fontSize:19, fontWeight:800, color:tx, display:"flex", alignItems:"center", gap:8 }}>
                <img src={LOGO_BASE64} style={{width: 24, height: 24}} alt="logo"/>
                Little Star Sales v2
              </div>
              <button style={{background:"none", border:"none", fontSize: 20, cursor:"pointer", color: tx}} onClick={()=>setDark(!dark)}>
                {dark ? "☀️" : "🌙"}
              </button>
            </div>
          </div>

          {/* TAB 1: NEW SALE */}
          {tab === "entry" && (
            <div>
              <div style={{...S.crd, borderTop: `4px solid ${acc}`}}>
                <div style={{display: "flex", gap: 8, marginBottom: 12}}>
                  <div style={{flex: 1}}>
                    <label style={S.lbl}>📅 Date</label>
                    <input type="date" style={S.inp} value={saleDate} onChange={e=>setSaleDate(e.target.value)} />
                  </div>
                  <div style={{flex: 1}}>
                    <label style={S.lbl}>🧾 Bill No.</label>
                    <input type="text" style={{...S.inp, background: dark ? "#1a1d27" : "#e0e0e0"}} disabled value={getNextSlip(activeBuyer?.n)} placeholder="Auto" />
                  </div>
                </div>
                
                <div style={{marginBottom: 12}}>
                  <label style={S.lbl}>🤝 Buyer</label>
                  <select style={S.sel} value={buyerIdx} onChange={e=>setBuyerIdx(e.target.value)}>
                    <option value="">— Select Buyer —</option>
                    {[...new Set(WHOLESALERS.map(w=>w.c))].map(city => (
                      <optgroup key={city} label={city}>
                        {WHOLESALERS.map((w, i) => w.c === city && <option key={i} value={i}>{w.n}</option>)}
                      </optgroup>
                    ))}
                  </select>
                </div>

                <div style={{marginBottom: 16}}>
                  <label style={{ display: "flex", alignItems: "center", gap: "8px", color: withPrice ? okC : txd, fontSize: "14px", fontWeight: 700, cursor: "pointer", background: dark?"#252836":"#f0f0ec", padding: "10px", borderRadius: 8 }}>
                    <input type="checkbox" checked={withPrice} onChange={e=>setWithPrice(e.target.checked)} style={{transform:"scale(1.2)"}} />
                    Include prices on printed invoice
                  </label>
                </div>

                <div style={{ fontSize: 13, fontWeight: 800, color: txd, textTransform: "uppercase", marginBottom: 8 }}>🚗 Enter Units</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, maxHeight: "40vh", overflowY: "auto", paddingRight: 4 }}>
                  {DEFAULT_CARS.map((c) => {
                    const q = carQtys[c.n] || "";
                    const hasQ = q > 0;
                    return (
                      <div key={c.n} style={{ display: "flex", alignItems: "center", gap: 6, background: hasQ ? (dark?"#1b2d1b":"#eef6ee") : (dark?"#252836":"#f0f0ec"), border: `1.5px solid ${hasQ?okC:"transparent"}`, padding: "6px 8px", borderRadius: 8 }}>
                        <div style={{ flex: 1, fontSize: 13, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.n}</div>
                        <input type="number" min="0" placeholder="0" value={q} onChange={e => setCarQtys({...carQtys, [c.n]: e.target.value})} style={{ width: 45, padding: "4px", borderRadius: 6, border: `1px solid ${cb}`, background: card, color: tx, textAlign: "center", fontWeight: 800 }} />
                      </div>
                    )
                  })}
                </div>

                <button onClick={handleGenerateInvoice} disabled={!activeBuyer} style={{...S.btn(okC), marginTop: 16, opacity: !activeBuyer ? 0.5 : 1}}>
                  🖨️ GENERATE INVOICE
                </button>
              </div>
            </div>
          )}

          {/* TAB 2: LOG */}
          {tab === "log" && (() => {
            let filteredLog = salesLog;
            if (logFilterWho) filteredLog = filteredLog.filter(s => s.wholesaler === logFilterWho);
            if (logFilterMonth) filteredLog = filteredLog.filter(s => s.date.startsWith(logFilterMonth));

            return(
            <div>
               <div style={{padding:"12px 14px 4px",fontSize:15,fontWeight:800}}>Sales Log</div>
               
               <div style={{display: 'flex', gap: 8, padding: '0 12px 10px'}}>
                  <select style={{...S.sel, flex: 1}} value={logFilterWho} onChange={e=>setLogFilterWho(e.target.value)}>
                     <option value="">All Buyers</option>
                     {[...new Set(WHOLESALERS.map(w=>w.n))].sort().map(w => <option key={w} value={w}>{w}</option>)}
                  </select>
                  <input type="month" style={{...S.inp, flex: 1}} value={logFilterMonth} onChange={e=>setLogFilterMonth(e.target.value)} />
               </div>

               {filteredLog.length === 0 && <div style={{...S.crd, textAlign:"center", color: txd}}>No sales found for this filter.</div>}
               
               {filteredLog.map(sale => {
                 const saleTotal = sale.items.reduce((s, it) => s + (it.qty * it.price), 0);
                 return (
                   <div key={sale.id} style={{...S.crd, padding: "10px 14px"}}>
                     <div style={{display: "flex", justifyContent: "space-between", marginBottom: 6}}>
                       <div style={{fontWeight: 800}}>{sale.wholesaler} <span style={{fontSize:12, color:txd, fontWeight:600}}>({sale.city})</span></div>
                       <div style={{fontSize: 12, fontWeight: 800, background: cb, padding: "2px 6px", borderRadius: 4}}>{sale.slipNo}</div>
                     </div>
                     <div style={{fontSize: 12, color: txd, marginBottom: 8}}>{fmtD(sale.date)} • {sale.totalUnits} Units • PKR {fmt(saleTotal)}</div>
                     
                     <div style={{display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10}}>
                       {sale.items.map(it => (
                         <span key={it.name} style={{fontSize: 11, background: dark?"#252836":"#f0f0ec", padding: "2px 6px", borderRadius: 4}}>
                           {it.name} × <b>{it.qty}</b>
                         </span>
                       ))}
                     </div>

                     <div style={{display: "flex", gap: 8}}>
                       <button onClick={()=>printSlipHTML(sale)} style={{...S.btn(acc), padding: "6px", flex: 1}}>🖨️ Reprint</button>
                       <button onClick={()=>{
                         if(confirm("Delete this sale?")){
                           const nl = salesLog.filter(s => s.id !== sale.id);
                           saveToLocal(nl, prices);
                           showToast("Sale deleted");
                         }
                       }} style={{...S.btn("transparent", dnC), border: `1px solid ${dnC}`, padding: "6px", flex: 1}}>🗑️ Delete</button>
                     </div>
                   </div>
                 )
               })}
            </div>
          )})()}

          {/* TAB 3: TODAY */}
          {tab === "today" && (() => {
            const today = todayStr();
            const ts = salesLog.filter(s => s.date === today);
            const totalU = ts.reduce((s,x) => s + x.totalUnits, 0);
            
            const mq = {};
            ts.forEach(s => s.items.forEach(it => { mq[it.name] = (mq[it.name]||0) + it.qty }));

            return (
              <div>
                <div style={{padding:"12px 14px 4px",fontSize:15,fontWeight:800}}>📊 Today — {fmtD(today)}</div>
                
                <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "0 12px 12px"}}>
                  <div style={{...S.crd, margin: 0, textAlign: "center", borderTop: `4px solid ${okC}`}}>
                    <div style={{fontSize: 11, color: txd, textTransform: "uppercase", fontWeight: 800}}>Total Units</div>
                    <div style={{fontSize: 24, fontWeight: 900}}>{fmt(totalU)}</div>
                  </div>
                  <div style={{...S.crd, margin: 0, textAlign: "center", borderTop: `4px solid ${acc}`}}>
                    <div style={{fontSize: 11, color: txd, textTransform: "uppercase", fontWeight: 800}}>Invoices</div>
                    <div style={{fontSize: 24, fontWeight: 900}}>{ts.length}</div>
                  </div>
                </div>

                {Object.keys(mq).length > 0 && (
                  <div style={S.crd}>
                    <div style={{fontSize: 13, fontWeight: 800, marginBottom: 10, color: txd}}>MODEL BREAKDOWN</div>
                    <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6}}>
                      {Object.entries(mq).sort((a,b)=>b[1]-a[1]).map(([n,q]) => (
                        <div key={n} style={{display: "flex", justifyContent: "space-between", background: dark?"#252836":"#f0f0ec", padding: "6px 10px", borderRadius: 6}}>
                          <span style={{fontSize: 12}}>{n}</span>
                          <span style={{fontWeight: 800, fontSize: 13}}>{q}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {ts.length === 0 && <div style={{textAlign: "center", color: txd, padding: 20}}>No sales recorded today.</div>}
              </div>
            )
          })()}

          {/* TAB 4: SETTINGS */}
          {tab === "settings" && (
            <div>
              <div style={{padding:"12px 14px 4px",fontSize:15,fontWeight:800}}>Settings</div>
              
              <div style={S.crd}>
                <label style={S.lbl}>Cloud Database</label>
                <div style={{fontSize:12,color:txd,marginBottom:10}}>Force a sync to fetch data from another device.</div>
                <button onClick={pullFromCloud} disabled={isSyncing} style={S.btn(acc)}>
                  {isSyncing ? "Syncing..." : "⬇️ Download Latest from Cloud"}
                </button>
              </div>

              <div style={S.crd}>
                <label style={S.lbl}>Backup & Restore (JSON)</label>
                <div style={{fontSize:12,color:txd,marginBottom:10}}>Keep offline copies of your data.</div>
                <div style={{display:"flex", gap:8}}>
                  <button onClick={doExportJSON} style={{...S.btn(okC), flex:1}}>📥 Export DB</button>
                  <label style={{...S.btn("transparent", tx), border: `1px solid ${cb}`, flex:1, cursor:"pointer"}}>
                    📤 Import DB
                    <input type="file" accept=".json" onChange={handleImportJSON} style={{display:"none"}}/>
                  </label>
                </div>
              </div>

              <div style={S.crd}>
                <label style={S.lbl}>Default Prices (PKR)</label>
                <div style={{fontSize:12,color:txd,marginBottom:10}}>Auto-applied to new invoices.</div>
                <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, maxHeight: "30vh", overflowY: "auto", paddingRight: 4, marginBottom: 10}}>
                  {DEFAULT_CARS.map(c => (
                    <div key={c.n} style={{background: dark?"#252836":"#f0f0ec", padding: "6px 8px", borderRadius: 6}}>
                      <div style={{fontSize: 11, fontWeight: 700, marginBottom: 2}}>{c.n}</div>
                      <input type="number" value={prices[c.n] || c.p} onChange={e => {
                        const np = {...prices, [c.n]: parseInt(e.target.value)||0 };
                        saveToLocal(salesLog, np);
                      }} style={{...S.inp, padding: "4px", fontSize: 13, fontWeight: 800, textAlign: "right"}} />
                    </div>
                  ))}
                </div>
              </div>

              <div style={{...S.crd, borderColor: dnC, borderWidth: 2}}>
                <label style={{...S.lbl, color: dnC}}>Security</label>
                <button onClick={()=>{
                  localStorage.removeItem("littlestar-auth");
                  setIsAuthenticated(false);
                }} style={{...S.btn("transparent", tx), border: `1px solid ${cb}`, marginTop: 8}}>🔒 Log Out & Lock App</button>
              </div>
            </div>
          )}

          <nav style={S.nav}>
            {[
              {k:"entry", i:"📝", l:"New Sale"},
              {k:"log", i:"📋", l:"Sales Log"},
              {k:"today", i:"📊", l:"Today"},
              {k:"settings", i:"⚙️", l:"Settings"}
            ].map(n=>(
              <button key={n.k} onClick={()=>setTab(n.k)} style={S.nI(tab===n.k)}>
                <span style={{fontSize:20}}>{n.i}</span>{n.l}
              </button>
            ))}
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
